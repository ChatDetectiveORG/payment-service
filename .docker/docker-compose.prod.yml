# =============================================================================
# LEGACY / NON-PRODUCTION. Do not use for production deployments.
# The only supported production path is k3s + Helm — see DEPLOY.md and
# k8s-cluster/docs/k3s-production-deploy.md in the monorepo root.
# =============================================================================
services:
  bot:
    image: ${DOCKERHUB_USERNAME}/${PROJECT_NAME}:latest
    container_name: ${PROJECT_NAME}
    restart: unless-stopped
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - RABBITMQ_URL=${RABBITMQ_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - DOCKER_TARGET=${DOCKER_TARGET}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME}-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${PUBLIC_POSTGRES_PORT}:5432"
    volumes:
      - /var/lib/postgresql/${PROJECT_NAME}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
