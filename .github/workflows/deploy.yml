name: Build and Push Image

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  SERVICE_DIR: payment-service
  IMAGE_NAME: payment-service
  GO_VERSION: "1.23.3"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout service
        uses: actions/checkout@v4
        with:
          path: ${{ env.SERVICE_DIR }}

      - name: Checkout shared module
        uses: actions/checkout@v4
        with:
          repository: ChatDetectiveORG/shared
          path: shared
          token: ${{ secrets.REPO_READ_TOKEN || github.token }}

      - name: Checkout telebot fork
        uses: actions/checkout@v4
        with:
          repository: bloodofspring/telebot
          path: forks/telebot

      - name: Set lowercase owner
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.SERVICE_DIR }}/go.sum

      - name: Test
        working-directory: ${{ env.SERVICE_DIR }}
        run: go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.SERVICE_DIR }}/.docker/Dockerfile
          target: prod
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ env.owner_lc }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ env.owner_lc }}/${{ env.IMAGE_NAME }}:latest
